[build]
publish = "."
command = "echo \"Static deploy for SwingTradingAI\""

[functions]
directory = "netlify/functions"
included_files = ["static/data/app-state.json"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[headers]]
for = "/static/data/*"
  [headers.values]
  Cache-Control = "public, max-age=300"
